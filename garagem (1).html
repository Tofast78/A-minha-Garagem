<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>A Minha Garagem</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c10;--surf:#0f1923;--surf2:#141d28;--border:#1c2836;
  --a1:#4facfe;--a2:#00f2fe;--warn:#f59e0b;--danger:#ef4444;--green:#43e97b;
  --muted:#5a7a99;--text:#dce8f5;--text-dim:#8fafc8;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,12,16,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:13px 28px;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{color:var(--a1)}
.logo-text{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#fff,var(--a1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--a1),var(--a2));color:#080c10}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--a1);color:var(--a1)}
.btn-sm{padding:5px 11px;font-size:.73rem}
.btn-danger{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:rgba(239,68,68,.2)}

/* ── ALERTS ── */
#alert-banner{display:none;padding:0 28px}
.alert-list{display:flex;flex-direction:column;gap:7px;padding:14px 0}
.alert-item{display:flex;align-items:center;gap:10px;padding:11px 15px;border-radius:11px;font-size:.83rem}
.alert-item.danger{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.alert-item.warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:#fcd34d}

/* ── SUMMARY ── */
.summary-wrap{padding:22px 28px 0}
.summary{display:flex;border:1px solid var(--border);border-radius:14px;background:var(--surf);overflow:hidden;max-width:560px}
.sum-item{flex:1;padding:15px 10px;text-align:center;border-right:1px solid var(--border)}
.sum-item:last-child{border-right:none}
.sum-num{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700}
.sum-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px}

/* ── FILTERS BAR ── */
.filters{display:flex;gap:8px;padding:20px 28px 4px;flex-wrap:wrap;align-items:center}
.filter-search{flex:1;min-width:180px;position:relative}
.filter-search input{width:100%;background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:9px 12px 9px 36px;color:var(--text);font-family:'Inter',sans-serif;font-size:.83rem;outline:none;transition:border-color .2s}
.filter-search input:focus{border-color:var(--a1)}
.filter-search input::placeholder{color:var(--muted)}
.filter-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.filter-select{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:.83rem;outline:none;cursor:pointer;transition:border-color .2s}
.filter-select:focus{border-color:var(--a1)}
.filter-select option{background:var(--surf2)}
.results-count{font-size:.78rem;color:var(--muted);margin-left:auto;align-self:center;white-space:nowrap}

/* ── GRID ── */
.vehicles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px;padding:16px 28px 60px}

/* ── VEHICLE CARD — layout like screenshot ── */
.vcard{
  background:var(--surf);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column;
  transition:border-color .25s,transform .25s,box-shadow .25s;
  cursor:default;
}
.vcard:hover{border-color:rgba(79,172,254,.4);transform:translateY(-3px);box-shadow:0 12px 32px rgba(79,172,254,.08)}
.vcard.has-danger{border-color:rgba(239,68,68,.35)}
.vcard.has-warn{border-color:rgba(245,158,11,.3)}

/* photo area */
.vcard-img-wrap{position:relative;width:100%;padding-top:62%;overflow:hidden;background:var(--surf2);border-bottom:1px solid var(--border)}
.vcard-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.vcard:hover .vcard-img-wrap img{transform:scale(1.03)}
.vcard-img-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3.5rem;color:var(--muted)}
/* campaign badge top-left */
.vcard-campaign{position:absolute;top:10px;left:10px;background:var(--a1);color:#080c10;font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:6px;letter-spacing:.04em}
/* wishlist button top-right */
.vcard-wish{position:absolute;top:10px;right:10px;background:rgba(8,12,16,.6);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:1rem;transition:all .2s;backdrop-filter:blur(4px)}
.vcard-wish:hover,.vcard-wish.active{color:#ef4444}
/* doc status ribbon bottom of image */
.vcard-ribbon{position:absolute;bottom:0;left:0;right:0;padding:6px 10px;background:linear-gradient(0deg,rgba(8,12,16,.85),transparent);display:flex;gap:5px;flex-wrap:wrap}
.ribbon-badge{font-size:.62rem;padding:2px 8px;border-radius:20px;font-weight:600;backdrop-filter:blur(2px)}
.ribbon-badge.ok{background:rgba(67,233,123,.2);color:var(--green);border:1px solid rgba(67,233,123,.3)}
.ribbon-badge.warn{background:rgba(245,158,11,.2);color:var(--warn);border:1px solid rgba(245,158,11,.3)}
.ribbon-badge.danger{background:rgba(239,68,68,.2);color:var(--danger);border:1px solid rgba(239,68,68,.3)}

/* card body */
.vcard-body{padding:16px;display:flex;flex-direction:column;gap:8px;flex:1}
.vcard-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:var(--text);line-height:1.15}
.vcard-subtitle{font-size:.78rem;color:var(--muted);margin-top:-4px}
/* tags row like screenshot */
.vcard-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.vtag{font-size:.72rem;padding:3px 10px;border-radius:6px;background:var(--surf2);border:1px solid var(--border);color:var(--text-dim);font-weight:500}
.vtag.fuel{border-color:rgba(79,172,254,.25);color:var(--a1)}
/* divider */
.vcard-divider{border:none;border-top:1px solid var(--border);margin:4px 0}
/* price section */
.vcard-price-label{font-size:.72rem;color:var(--muted)}
.vcard-price-old{font-size:.85rem;color:var(--muted);text-decoration:line-through}
.vcard-price-new{font-size:1.5rem;font-weight:800;font-family:'Syne',sans-serif;color:var(--a1);line-height:1.1}
.vcard-price-note{font-size:.68rem;color:var(--muted);margin-top:2px}
/* bottom badges */
.vcard-bottom{display:flex;gap:5px;flex-wrap:wrap;padding:0 16px 14px;margin-top:auto}
.vbadge{font-size:.7rem;font-weight:700;padding:4px 11px;border-radius:7px}
.vbadge.destaque{background:rgba(79,172,254,.12);color:var(--a1);border:1px solid rgba(79,172,254,.3)}
.vbadge.poucos{background:rgba(67,233,123,.1);color:var(--green);border:1px solid rgba(67,233,123,.25)}
.vbadge.expirado{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.25)}
.vbadge.expira{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.25)}
/* actions */
.vcard-actions{display:flex;gap:6px;padding:0 16px 14px;flex-wrap:wrap}

/* ── EMPTY ── */
.empty{grid-column:1/-1;text-align:center;padding:64px 24px;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:12px;opacity:.35}

/* ── MODAIS ── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:20px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:26px;display:flex;flex-direction:column;gap:16px;transform:translateY(18px);transition:transform .25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#fff,var(--a1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;line-height:1;padding:4px 8px;transition:color .2s;border-radius:6px}
.modal-close:hover{color:var(--text);background:var(--surf2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.form-group input,.form-group select,.form-group textarea{background:var(--surf2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-family:'Inter',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s;width:100%}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--a1)}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--muted)}
.form-group textarea{resize:vertical;min-height:64px}
.form-group select option{background:var(--surf2)}
.form-section-label{grid-column:1/-1;font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--a1);text-transform:uppercase;letter-spacing:.12em;padding-bottom:5px;border-bottom:1px solid var(--border);margin-top:4px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
#f-photo-preview{display:none;margin-top:8px;width:100%;max-height:150px;object-fit:cover;border-radius:10px;border:1px solid var(--border)}

/* ── DETALHE LATERAL ── */
.detail-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);display:flex;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.detail-overlay.open{opacity:1;pointer-events:all}
.detail-panel{background:var(--surf);border-left:1px solid var(--border);width:100%;max-width:440px;height:100%;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:16px;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.detail-overlay.open .detail-panel{transform:translateX(0)}
.detail-photo{width:100%;height:170px;border-radius:14px;overflow:hidden;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:3.5rem;border:1px solid var(--border)}
.detail-photo img{width:100%;height:100%;object-fit:cover;display:block}
.detail-name{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--text)}
.detail-plate{font-family:'JetBrains Mono',monospace;font-size:.82rem;padding:3px 11px;border:1px solid var(--border);border-radius:8px;color:var(--a1);background:rgba(79,172,254,.06);display:inline-block;margin-top:5px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.info-box{background:var(--surf2);border:1px solid var(--border);border-radius:11px;padding:11px}
.info-box.full{grid-column:1/-1}
.info-box-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.info-box-val{font-size:.86rem;color:var(--text);font-weight:500;margin-top:3px}
.doc-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:5px}
.dbadge{font-size:.68rem;padding:2px 9px;border-radius:20px;font-weight:500}
.dbadge.ok{background:rgba(67,233,123,.08);color:var(--green);border:1px solid rgba(67,233,123,.2)}
.dbadge.warn{background:rgba(245,158,11,.08);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.dbadge.danger{background:rgba(239,68,68,.08);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.dbadge.neutral{background:rgba(90,122,153,.06);color:var(--muted);border:1px solid var(--border)}
.maint-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.maint-label{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--a1);text-transform:uppercase;letter-spacing:.12em}
.maint-list{display:flex;flex-direction:column;gap:7px}
.maint-item{background:var(--surf2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;display:flex;align-items:flex-start;gap:9px}
.maint-dot{width:6px;height:6px;border-radius:50%;background:var(--a1);flex-shrink:0;margin-top:6px}
.maint-info{flex:1;min-width:0}
.maint-desc{font-size:.83rem;color:var(--text);line-height:1.4}
.maint-meta{font-size:.7rem;color:var(--muted);margin-top:2px;line-height:1.5}
.maint-empty{font-size:.82rem;color:var(--muted);text-align:center;padding:18px 0;font-style:italic}
.maint-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.82rem;padding:2px 5px;border-radius:5px;transition:all .2s;flex-shrink:0}
.maint-del:hover{color:var(--danger);background:rgba(239,68,68,.1)}

/* ── MAINT MODAL ── */
#maint-modal .modal{max-width:420px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surf2);border:1px solid var(--border);border-radius:11px;padding:10px 20px;font-size:.83rem;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:all .3s;z-index:500;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:560px){
  .form-grid{grid-template-columns:1fr}
  .form-full,.form-section-label{grid-column:1}
  .vehicles-grid{padding:12px 14px 48px}
  .filters{padding:14px 14px 0}
  .summary-wrap{padding:16px 14px 0}
  .topbar{padding:12px 14px}
  .topbar-right{width:100%}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="1" y="3" width="15" height="13" rx="2"/>
      <path d="M16 8h4l3 3v5h-7V8z"/>
      <circle cx="5.5" cy="18.5" r="2.5"/>
      <circle cx="18.5" cy="18.5" r="2.5"/>
    </svg>
    <span class="logo-text">A Minha Garagem</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ Exportar</button>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('import-file').click()">⬆ Importar</button>
    <input type="file" id="import-file" accept=".json" style="display:none"/>
    <button class="btn btn-primary" onclick="openVehicleModal(null)">+ Adicionar viatura</button>
  </div>
</div>

<!-- ALERTS -->
<div id="alert-banner">
  <div class="alert-list" id="alert-list"></div>
</div>

<!-- SUMMARY -->
<div class="summary-wrap">
  <div class="summary">
    <div class="sum-item"><div class="sum-num" style="background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text" id="s-total">0</div><div class="sum-label">Viaturas</div></div>
    <div class="sum-item"><div class="sum-num" style="color:var(--green)" id="s-ok">0</div><div class="sum-label">Em dia</div></div>
    <div class="sum-item"><div class="sum-num" style="color:var(--warn)" id="s-warn">0</div><div class="sum-label">A expirar</div></div>
    <div class="sum-item"><div class="sum-num" style="color:var(--danger)" id="s-danger">0</div><div class="sum-label">Expirados</div></div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="f-search" placeholder="Pesquisar viatura…" oninput="renderGrid()"/>
  </div>
  <select class="filter-select" id="f-fuel-filter" onchange="renderGrid()">
    <option value="">Combustível</option>
    <option>Gasolina</option><option>Gasóleo</option>
    <option>Híbrido</option><option>Elétrico</option><option>GPL</option>
  </select>
  <select class="filter-select" id="f-status-filter" onchange="renderGrid()">
    <option value="">Estado docs</option>
    <option value="ok">Em dia</option>
    <option value="warn">A expirar</option>
    <option value="danger">Expirados</option>
  </select>
  <span class="results-count" id="results-count"></span>
</div>

<!-- GRID -->
<div class="vehicles-grid" id="vehicles-grid">
  <div class="empty"><div class="empty-icon">🚗</div><p>Ainda não há viaturas.<br>Clica em "+ Adicionar viatura" para começar.</p></div>
</div>

<!-- MODAL VIATURA -->
<div class="modal-overlay" id="vehicle-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nova Viatura</span>
      <button class="modal-close" onclick="closeModal('vehicle-modal')">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-section-label">Identificação</div>
      <div class="form-group form-full">
        <label>Marca e Modelo *</label>
        <input id="f-name" placeholder="ex: Peugeot 208 1.2 Allure"/>
      </div>
      <div class="form-group form-full">
        <label>Versão / Variante</label>
        <input id="f-variant" placeholder="ex: 208 1.2 Hybrid Allure E-Dcs6"/>
      </div>
      <div class="form-group">
        <label>Matrícula</label>
        <input id="f-plate" placeholder="AA-00-BB"/>
      </div>
      <div class="form-group">
        <label>Ano</label>
        <input id="f-year" type="number" min="1900" max="2100" placeholder="2024"/>
      </div>
      <div class="form-group">
        <label>Combustível</label>
        <select id="f-fuel">
          <option value="">– Selecionar –</option>
          <option>Gasolina</option><option>Gasóleo</option>
          <option>Híbrido</option><option>Híbrido Plug-In (Gasolina)</option>
          <option>Elétrico</option><option>GPL</option>
        </select>
      </div>
      <div class="form-group">
        <label>Caixa</label>
        <select id="f-gearbox">
          <option value="">– Selecionar –</option>
          <option>Caixa Manual</option>
          <option>Caixa Automática</option>
        </select>
      </div>
      <div class="form-group">
        <label>Cor</label>
        <input id="f-color" placeholder="ex: Branco"/>
      </div>
      <div class="form-group">
        <label>Quilómetros</label>
        <input id="f-km" type="number" placeholder="ex: 33707"/>
      </div>
      <div class="form-group">
        <label>Preço (€)</label>
        <input id="f-price" type="number" placeholder="ex: 21999"/>
      </div>
      <div class="form-group">
        <label>Preço anterior (€)</label>
        <input id="f-price-old" type="number" placeholder="ex: 23499"/>
      </div>

      <div class="form-section-label">Foto da viatura</div>
      <div class="form-group form-full">
        <label>URL de imagem</label>
        <input id="f-photo-url" placeholder="https://..." oninput="onPhotoUrlChange()"/>
      </div>
      <div class="form-group form-full">
        <label>Ou carrega do dispositivo</label>
        <button type="button" class="btn btn-ghost btn-sm" style="width:fit-content" onclick="document.getElementById('f-photo-file').click()">📷 Escolher ficheiro</button>
        <input type="file" id="f-photo-file" accept="image/*" style="display:none"/>
        <img id="f-photo-preview"/>
      </div>

      <div class="form-section-label">Documentos</div>
      <div class="form-group">
        <label>Seguro — validade</label>
        <input id="f-seguro" type="date"/>
      </div>
      <div class="form-group">
        <label>Inspeção — validade</label>
        <input id="f-inspecao" type="date"/>
      </div>
      <div class="form-group">
        <label>IUC — validade</label>
        <input id="f-iuc" type="date"/>
      </div>
      <div class="form-group form-full">
        <label>Notas</label>
        <textarea id="f-notes" placeholder="Informações adicionais…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('vehicle-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveVehicle()">Guardar viatura</button>
    </div>
  </div>
</div>

<!-- MODAL MANUTENÇÃO -->
<div class="modal-overlay" id="maint-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title">Registar manutenção</span>
      <button class="modal-close" onclick="closeModal('maint-modal')">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Descrição *</label>
        <input id="m-desc" placeholder="ex: Mudança de óleo e filtro"/>
      </div>
      <div class="form-group">
        <label>Data</label>
        <input id="m-date" type="date"/>
      </div>
      <div class="form-group">
        <label>Km</label>
        <input id="m-km" type="number" placeholder="km no momento"/>
      </div>
      <div class="form-group">
        <label>Custo (€)</label>
        <input id="m-cost" type="number" step="0.01" placeholder="0.00"/>
      </div>
      <div class="form-group">
        <label>Próx. manutenção (km)</label>
        <input id="m-next" type="number" placeholder="opcional"/>
      </div>
      <div class="form-group form-full">
        <label>Notas</label>
        <textarea id="m-notes" placeholder="Oficina, peças, garantia…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('maint-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMaintenance()">Guardar</button>
    </div>
  </div>
</div>

<!-- PAINEL DETALHE -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE = 'garagem_v4';
let db = { vehicles: [] };
let editingId = null;
let activeVehicleId = null;
let pendingPhotoData = null;

function dbLoad(){ try{ const r=localStorage.getItem(STORE); if(r) db=JSON.parse(r); }catch(e){} }
function dbSave(){ localStorage.setItem(STORE, JSON.stringify(db)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

// ── DATES ──
function daysUntil(ds){ if(!ds) return null; return Math.ceil((new Date(ds)-new Date())/86400000); }
function fmtDate(ds){ if(!ds) return '–'; return new Date(ds).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtKm(k){ if(!k) return '–'; return Number(k).toLocaleString('pt-PT')+' kms'; }
function fmtPrice(p){ if(!p) return null; return Number(p).toLocaleString('pt-PT')+'€'; }
function docStatus(ds){
  const d=daysUntil(ds);
  if(d===null) return {cls:'neutral',txt:'Não definido'};
  if(d<0)      return {cls:'danger', txt:`Expirado há ${Math.abs(d)}d`};
  if(d<=30)    return {cls:'warn',   txt:`Expira em ${d}d`};
  return              {cls:'ok',     txt:`Válido — ${d}d`};
}
function worstStatus(v){
  let w='ok';
  ['seguro','inspecao','iuc'].forEach(k=>{
    const s=docStatus(v[k]).cls;
    if(s==='danger') w='danger';
    else if(s==='warn'&&w!=='danger') w='warn';
  });
  return w;
}

// ── RENDER ──
function render(){ renderSummary(); renderAlerts(); renderGrid(); }

function renderSummary(){
  let ok=0,warn=0,danger=0;
  db.vehicles.forEach(v=>{ const w=worstStatus(v); if(w==='danger') danger++; else if(w==='warn') warn++; else ok++; });
  document.getElementById('s-total').textContent=db.vehicles.length;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-warn').textContent=warn;
  document.getElementById('s-danger').textContent=danger;
}

function renderAlerts(){
  const banner=document.getElementById('alert-banner');
  const list=document.getElementById('alert-list');
  const alerts=[];
  db.vehicles.forEach(v=>{
    [['seguro','🛡 Seguro'],['inspecao','🔧 Inspeção'],['iuc','📄 IUC']].forEach(([k,label])=>{
      const st=docStatus(v[k]);
      if(st.cls==='danger') alerts.push({cls:'danger',msg:`<b>${v.name}</b> — ${label}: <b>${st.txt}</b>`});
      else if(st.cls==='warn') alerts.push({cls:'warn',msg:`<b>${v.name}</b> — ${label}: <b>${st.txt}</b>`});
    });
  });
  if(!alerts.length){ banner.style.display='none'; return; }
  banner.style.display='block';
  list.innerHTML=alerts.map(a=>`<div class="alert-item ${a.cls}"><span>${a.cls==='danger'?'🔴':'🟡'}</span><span>${a.msg}</span></div>`).join('');
}

function renderGrid(){
  const grid=document.getElementById('vehicles-grid');
  const q=(document.getElementById('f-search').value||'').toLowerCase();
  const fuelF=document.getElementById('f-fuel-filter').value;
  const stF=document.getElementById('f-status-filter').value;

  let list=db.vehicles.filter(v=>{
    if(q && !v.name.toLowerCase().includes(q) && !(v.variant||'').toLowerCase().includes(q) && !(v.plate||'').toLowerCase().includes(q)) return false;
    if(fuelF && v.fuel!==fuelF) return false;
    if(stF && worstStatus(v)!==stF) return false;
    return true;
  });

  document.getElementById('results-count').textContent=list.length
    ? `${list.length} viatura${list.length!==1?'s':''}`
    : '';

  if(!list.length){
    grid.innerHTML=db.vehicles.length
      ?`<div class="empty"><div class="empty-icon">🔍</div><p>Nenhuma viatura encontrada com esses filtros.</p></div>`
      :`<div class="empty"><div class="empty-icon">🚗</div><p>Ainda não há viaturas.<br>Clica em "+ Adicionar viatura" para começar.</p></div>`;
    return;
  }

  grid.innerHTML=list.map(v=>{
    const ws=worstStatus(v);
    const seg=docStatus(v.seguro);
    const ins=docStatus(v.inspecao);
    const iuc=docStatus(v.iuc);
    const priceNew=fmtPrice(v.price);
    const priceOld=fmtPrice(v['price-old']);
    const isWished=(v.wished||false);

    const tags=[
      v.fuel?`<span class="vtag fuel">${v.fuel}</span>`:'',
      v.gearbox?`<span class="vtag">${v.gearbox}</span>`:'',
      v.year?`<span class="vtag">${v.year}</span>`:'',
      v.km?`<span class="vtag">${fmtKm(v.km)}</span>`:'',
    ].filter(Boolean).join('');

    const bottomBadges=[
      ws==='danger'?`<span class="vbadge expirado">🔴 Doc. Expirado</span>`:'',
      ws==='warn'?`<span class="vbadge expira">⚠ A expirar</span>`:'',
      ws==='ok'&&v.seguro?`<span class="vbadge destaque">✓ Em Destaque</span>`:'',
      v.km&&Number(v.km)<10000?`<span class="vbadge poucos">Poucos km</span>`:'',
    ].filter(Boolean).join('');

    const ribbonBadges=[
      v.seguro?`<span class="ribbon-badge ${seg.cls}">🛡 ${seg.txt}</span>`:'',
      v.inspecao?`<span class="ribbon-badge ${ins.cls}">🔧 ${ins.txt}</span>`:'',
    ].filter(Boolean).join('');

    return `<div class="vcard ${ws==='danger'?'has-danger':ws==='warn'?'has-warn':''}">
      <div class="vcard-img-wrap">
        ${v.photo
          ?`<img src="${v.photo}" alt="${v.name}" onerror="this.outerHTML='<div class=vcard-img-placeholder>🚗</div>'"/>`
          :`<div class="vcard-img-placeholder">🚗</div>`}
        <span class="vcard-campaign">Em Garagem</span>
        <button class="vcard-wish ${isWished?'active':''}" onclick="toggleWish('${v.id}')" title="Favorito">${isWished?'♥':'♡'}</button>
        ${ribbonBadges?`<div class="vcard-ribbon">${ribbonBadges}</div>`:''}
      </div>
      <div class="vcard-body">
        <div class="vcard-title">${v.name}</div>
        ${v.variant?`<div class="vcard-subtitle">${v.variant}</div>`:''}
        <div class="vcard-tags">${tags||'<span class="vtag" style="opacity:.4">–</span>'}</div>
        <hr class="vcard-divider"/>
        ${priceNew
          ?`<div class="vcard-price-label">Valor</div>
            ${priceOld?`<div class="vcard-price-old">${priceOld}</div>`:''}
            <div class="vcard-price-new">${priceNew}</div>`
          :`<div style="height:6px"></div>`}
      </div>
      ${bottomBadges?`<div class="vcard-bottom">${bottomBadges}</div>`:'<div style="height:8px"></div>'}
      <div class="vcard-actions">
        <button class="btn btn-ghost btn-sm" onclick="openDetail('${v.id}')">Ver detalhes</button>
        <button class="btn btn-ghost btn-sm" onclick="openVehicleModal('${v.id}')">✏ Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteVehicle('${v.id}')">Apagar</button>
      </div>
    </div>`;
  }).join('');
}

// ── WISH ──
function toggleWish(id){
  const v=db.vehicles.find(x=>x.id===id); if(!v) return;
  v.wished=!v.wished; dbSave(); renderGrid();
}

// ── MODAL VIATURA ──
function openVehicleModal(id){
  editingId=id; pendingPhotoData=null;
  const fields=['name','variant','plate','year','color','km','price','price-old','seguro','inspecao','iuc','notes','photo-url'];
  fields.forEach(fid=>{ const el=document.getElementById('f-'+fid); if(el) el.value=''; });
  document.getElementById('f-fuel').value='';
  document.getElementById('f-gearbox').value='';
  document.getElementById('f-photo-file').value='';
  const prev=document.getElementById('f-photo-preview');
  prev.style.display='none'; prev.src='';
  document.getElementById('modal-title').textContent=id?'Editar Viatura':'Nova Viatura';

  if(id){
    const v=db.vehicles.find(x=>x.id===id);
    if(v){
      const map={name:'name',variant:'variant',plate:'plate',year:'year',color:'color',km:'km',price:'price','price-old':'price-old',seguro:'seguro',inspecao:'inspecao',iuc:'iuc',notes:'notes'};
      Object.entries(map).forEach(([field,fid])=>{ const el=document.getElementById('f-'+fid); if(el&&v[field]!=null) el.value=v[field]; });
      if(v.fuel) document.getElementById('f-fuel').value=v.fuel;
      if(v.gearbox) document.getElementById('f-gearbox').value=v.gearbox;
      if(v.photo){
        if(v.photo.startsWith('data:')){ pendingPhotoData=v.photo; prev.src=v.photo; prev.style.display='block'; }
        else{ document.getElementById('f-photo-url').value=v.photo; prev.src=v.photo; prev.style.display='block'; }
      }
    }
  }
  document.getElementById('vehicle-modal').classList.add('open');
}

function onPhotoUrlChange(){
  const url=document.getElementById('f-photo-url').value.trim();
  const prev=document.getElementById('f-photo-preview');
  pendingPhotoData=null;
  if(url){ prev.src=url; prev.style.display='block'; } else { prev.style.display='none'; prev.src=''; }
}

document.getElementById('f-photo-file').addEventListener('change',function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingPhotoData=ev.target.result;
    document.getElementById('f-photo-url').value='';
    const prev=document.getElementById('f-photo-preview');
    prev.src=pendingPhotoData; prev.style.display='block';
  };
  reader.readAsDataURL(file);
});

function saveVehicle(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ showToast('⚠ Indica a marca e modelo'); return; }
  const photo=pendingPhotoData||document.getElementById('f-photo-url').value.trim();
  const v={
    id:editingId||uid(), name,
    variant:document.getElementById('f-variant').value.trim(),
    plate:document.getElementById('f-plate').value.trim().toUpperCase(),
    year:document.getElementById('f-year').value.trim(),
    fuel:document.getElementById('f-fuel').value,
    gearbox:document.getElementById('f-gearbox').value,
    color:document.getElementById('f-color').value.trim(),
    km:document.getElementById('f-km').value.trim(),
    price:document.getElementById('f-price').value.trim(),
    'price-old':document.getElementById('f-price-old').value.trim(),
    photo,
    seguro:document.getElementById('f-seguro').value,
    inspecao:document.getElementById('f-inspecao').value,
    iuc:document.getElementById('f-iuc').value,
    notes:document.getElementById('f-notes').value.trim(),
    maintenance:[],
    wished:false
  };
  if(editingId){
    const idx=db.vehicles.findIndex(x=>x.id===editingId);
    if(idx>-1){ v.maintenance=db.vehicles[idx].maintenance||[]; v.wished=db.vehicles[idx].wished||false; db.vehicles[idx]=v; }
  } else {
    db.vehicles.push(v);
  }
  dbSave(); render();
  closeModal('vehicle-modal');
  showToast(editingId?'✓ Viatura atualizada':'✓ Viatura adicionada');
}

function deleteVehicle(id){
  if(!confirm('Apagar esta viatura e todo o historial?')) return;
  db.vehicles=db.vehicles.filter(v=>v.id!==id);
  dbSave(); render();
  showToast('Viatura removida');
}

// ── DETALHE ──
function openDetail(id){
  const v=db.vehicles.find(x=>x.id===id); if(!v) return;
  activeVehicleId=id;
  const seg=docStatus(v.seguro); const ins=docStatus(v.inspecao); const iuc=docStatus(v.iuc);
  const maints=(v.maintenance||[]).slice().reverse();
  const maintHTML=maints.length
    ?maints.map((m,i)=>`<div class="maint-item">
        <div class="maint-dot"></div>
        <div class="maint-info">
          <div class="maint-desc">${m.desc}</div>
          <div class="maint-meta">${fmtDate(m.date)}${m.km?' · '+Number(m.km).toLocaleString('pt-PT')+' km':''}${m.cost?' · '+Number(m.cost).toFixed(2)+'€':''}${m.next?'<br>Próx: '+Number(m.next).toLocaleString('pt-PT')+' km':''}${m.notes?'<br>'+m.notes:''}</div>
        </div>
        <button class="maint-del" onclick="deleteMaint('${id}',${maints.length-1-i})">✕</button>
      </div>`).join('')
    :`<div class="maint-empty">Sem registos de manutenção.</div>`;

  document.getElementById('detail-panel').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Detalhe</span>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-photo">${v.photo?`<img src="${v.photo}" alt="${v.name}" onerror="this.outerHTML='🚗'"/>`:'🚗'}</div>
    <div>
      <div class="detail-name">${v.name}</div>
      ${v.variant?`<div style="font-size:.82rem;color:var(--muted);margin-top:3px">${v.variant}</div>`:''}
      ${v.plate?`<div class="detail-plate">${v.plate}</div>`:''}
    </div>
    <div class="info-grid">
      <div class="info-box"><div class="info-box-label">Ano</div><div class="info-box-val">${v.year||'–'}</div></div>
      <div class="info-box"><div class="info-box-label">Combustível</div><div class="info-box-val">${v.fuel||'–'}</div></div>
      <div class="info-box"><div class="info-box-label">Caixa</div><div class="info-box-val">${v.gearbox||'–'}</div></div>
      <div class="info-box"><div class="info-box-label">Cor</div><div class="info-box-val">${v.color||'–'}</div></div>
      <div class="info-box"><div class="info-box-label">Quilómetros</div><div class="info-box-val">${fmtKm(v.km)}</div></div>
      ${v.price?`<div class="info-box"><div class="info-box-label">Valor</div><div class="info-box-val" style="color:var(--a1);font-weight:700">${fmtPrice(v.price)}</div></div>`:''}
      <div class="info-box full"><div class="info-box-label">🛡 Seguro</div><div class="doc-row"><span class="info-box-val">${fmtDate(v.seguro)}</span><span class="dbadge ${seg.cls}">${seg.txt}</span></div></div>
      <div class="info-box full"><div class="info-box-label">🔧 Inspeção</div><div class="doc-row"><span class="info-box-val">${fmtDate(v.inspecao)}</span><span class="dbadge ${ins.cls}">${ins.txt}</span></div></div>
      ${v.iuc?`<div class="info-box full"><div class="info-box-label">📄 IUC</div><div class="doc-row"><span class="info-box-val">${fmtDate(v.iuc)}</span><span class="dbadge ${iuc.cls}">${iuc.txt}</span></div></div>`:''}
      ${v.notes?`<div class="info-box full"><div class="info-box-label">Notas</div><div class="info-box-val" style="color:var(--text-dim);font-size:.82rem;margin-top:4px">${v.notes}</div></div>`:''}
    </div>
    <div>
      <div class="maint-header"><span class="maint-label">📋 Historial de Manutenção</span><button class="btn btn-ghost btn-sm" onclick="openMaintModal()">+ Registar</button></div>
      <div class="maint-list">${maintHTML}</div>
    </div>`;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(){ document.getElementById('detail-overlay').classList.remove('open'); }
document.getElementById('detail-overlay').addEventListener('click',function(e){ if(e.target===this) closeDetail(); });

// ── MANUTENÇÃO ──
function openMaintModal(){
  document.getElementById('m-desc').value='';
  document.getElementById('m-date').value=new Date().toISOString().slice(0,10);
  ['m-km','m-cost','m-next','m-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('maint-modal').classList.add('open');
}
function saveMaintenance(){
  const desc=document.getElementById('m-desc').value.trim();
  if(!desc){ showToast('⚠ Descreve a manutenção'); return; }
  const v=db.vehicles.find(x=>x.id===activeVehicleId); if(!v) return;
  if(!v.maintenance) v.maintenance=[];
  v.maintenance.push({ desc, date:document.getElementById('m-date').value, km:document.getElementById('m-km').value.trim(), cost:document.getElementById('m-cost').value.trim(), next:document.getElementById('m-next').value.trim(), notes:document.getElementById('m-notes').value.trim() });
  dbSave(); render(); closeModal('maint-modal'); openDetail(activeVehicleId);
  showToast('✓ Manutenção registada');
}
function deleteMaint(vehicleId,realIdx){
  if(!confirm('Apagar este registo?')) return;
  const v=db.vehicles.find(x=>x.id===vehicleId); if(!v||!v.maintenance) return;
  v.maintenance.splice(realIdx,1); dbSave(); render(); openDetail(vehicleId);
  showToast('Registo removido');
}

// ── MODAIS ──
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
['vehicle-modal','maint-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){ if(e.target===this) closeModal(id); });
});

// ── EXPORT / IMPORT ──
function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='garagem_dados.json'; a.click();
  showToast('✓ Dados exportados');
}
document.getElementById('import-file').addEventListener('change',function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      if(!Array.isArray(imp.vehicles)) throw new Error();
      if(!confirm(`Importar ${imp.vehicles.length} viatura(s)? Os dados atuais serão substituídos.`)) return;
      db=imp; dbSave(); render();
      showToast(`✓ ${db.vehicles.length} viaturas importadas`);
    }catch{ showToast('⚠ Ficheiro inválido'); }
  };
  reader.readAsText(file); this.value='';
});

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── INIT ──
dbLoad(); render();
</script>
</body>
</html>
