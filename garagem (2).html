<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>A Minha Garagem</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;
  --white:#ffffff;
  --red:#e31e24;
  --red-dark:#c0191e;
  --text:#1a1a2e;
  --text2:#4a4a6a;
  --muted:#8888a8;
  --border:#e4e4ef;
  --surf:#ffffff;
  --surf2:#f0f1f5;
  --green:#16a34a;
  --warn:#d97706;
  --danger:#dc2626;
  --shadow:0 2px 12px rgba(26,26,46,.07);
  --shadow-hover:0 8px 32px rgba(26,26,46,.13);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}

/* ── TOPBAR ── */
.topbar{
  background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:68px;gap:16px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 0 var(--border);
}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{
  width:40px;height:40px;background:var(--red);border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.logo-icon svg{color:#fff}
.logo-name{font-size:1.1rem;font-weight:800;color:var(--text);letter-spacing:-.5px}
.logo-name span{color:var(--red)}
.topbar-right{display:flex;gap:8px;align-items:center}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:8px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;
  cursor:pointer;border:none;transition:all .18s;text-decoration:none;white-space:nowrap;
}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:var(--red-dark);transform:translateY(-1px);box-shadow:0 4px 14px rgba(227,30,36,.3)}
.btn-outline{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--red);color:var(--red)}
.btn-sm{padding:6px 13px;font-size:.76rem}
.btn-ghost-red{background:rgba(227,30,36,.07);color:var(--red);border:1.5px solid rgba(227,30,36,.2)}
.btn-ghost-red:hover{background:rgba(227,30,36,.14)}
.btn-danger{background:rgba(220,38,38,.07);color:var(--danger);border:1.5px solid rgba(220,38,38,.18)}
.btn-danger:hover{background:rgba(220,38,38,.14)}

/* ── ALERTS ── */
#alert-banner{display:none;padding:0 32px}
.alert-list{display:flex;flex-direction:column;gap:6px;padding:12px 0}
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:500}
.alert-item.danger{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c}
.alert-item.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}

/* ── HERO STRIP ── */
.hero-strip{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:28px 32px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:24px;
  flex-wrap:wrap;
}
.hero-left h1{font-size:1.6rem;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.hero-left h1 span{color:var(--red)}
.hero-left p{font-size:.87rem;color:var(--text2);margin-top:5px}
.summary{display:flex;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surf2)}
.sum-item{padding:14px 22px;text-align:center;border-right:1px solid var(--border)}
.sum-item:last-child{border-right:none}
.sum-num{font-size:1.5rem;font-weight:800;color:var(--text)}
.sum-num.r{color:var(--red)}
.sum-num.g{color:var(--green)}
.sum-num.w{color:var(--warn)}
.sum-num.d{color:var(--danger)}
.sum-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

/* ── FILTERS ── */
.filters-bar{
  display:flex;gap:10px;padding:18px 32px;
  background:var(--white);border-bottom:1px solid var(--border);
  flex-wrap:wrap;align-items:center;
}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-wrap input{
  width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:9px;padding:10px 13px 10px 38px;
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;
  outline:none;transition:border-color .18s;
}
.search-wrap input:focus{border-color:var(--red);background:var(--white)}
.search-wrap input::placeholder{color:var(--muted)}
.filter-sel{
  background:var(--bg);border:1.5px solid var(--border);border-radius:9px;
  padding:10px 13px;color:var(--text2);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;
  outline:none;cursor:pointer;transition:border-color .18s;
}
.filter-sel:focus{border-color:var(--red)}
.filter-sel option{background:var(--white)}
.results-tag{font-size:.78rem;color:var(--muted);margin-left:auto;align-self:center}

/* ── LAYOUT ── */
.page-body{display:flex;gap:0;max-width:1400px;margin:0 auto;padding:28px 32px 64px}
.vehicles-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(256px,1fr));
  gap:18px;flex:1;align-content:start;
}

/* ── CARD ── */
.vcard{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:var(--shadow);transition:box-shadow .22s,transform .22s,border-color .22s;
}
.vcard:hover{box-shadow:var(--shadow-hover);transform:translateY(-3px);border-color:rgba(227,30,36,.2)}
.vcard.has-danger{border-color:#fca5a5}
.vcard.has-warn{border-color:#fde68a}

/* image */
.vcard-img{position:relative;width:100%;padding-top:60%;overflow:hidden;background:var(--bg)}
.vcard-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.vcard:hover .vcard-img img{transform:scale(1.04)}
.vcard-img-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3.5rem;color:#ccc}
.badge-campaign{
  position:absolute;top:10px;left:10px;
  background:var(--red);color:#fff;
  font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.04em;
}
.btn-wish{
  position:absolute;top:10px;right:10px;
  width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1rem;transition:all .18s;box-shadow:0 1px 4px rgba(0,0,0,.12);
  color:#bbb;
}
.btn-wish:hover,.btn-wish.active{color:var(--red)}
.doc-ribbon{
  position:absolute;bottom:0;left:0;right:0;
  padding:5px 9px;background:linear-gradient(0deg,rgba(0,0,0,.55),transparent);
  display:flex;gap:4px;flex-wrap:wrap;
}
.doc-pip{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:20px;backdrop-filter:blur(2px)}
.doc-pip.ok{background:rgba(22,163,74,.2);color:#bbf7d0;border:1px solid rgba(22,163,74,.4)}
.doc-pip.warn{background:rgba(217,119,6,.2);color:#fde68a;border:1px solid rgba(217,119,6,.35)}
.doc-pip.danger{background:rgba(220,38,38,.25);color:#fecaca;border:1px solid rgba(220,38,38,.4)}

/* body */
.vcard-body{padding:15px 16px;display:flex;flex-direction:column;gap:7px;flex:1}
.vcard-title{font-size:1rem;font-weight:800;color:var(--text);line-height:1.2}
.vcard-sub{font-size:.75rem;color:var(--muted);margin-top:-3px}
.vtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.vtag{font-size:.7rem;padding:3px 9px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-weight:600}
.vtag.fuel{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
hr.vdiv{border:none;border-top:1px solid var(--border);margin:4px 0}
.price-label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.price-old{font-size:.82rem;color:var(--muted);text-decoration:line-through}
.price-new{font-size:1.45rem;font-weight:800;color:var(--red);line-height:1.1}
.price-note{font-size:.65rem;color:var(--muted);margin-top:1px}
.vcard-spacer{flex:1}

/* bottom */
.vcard-bottom{display:flex;gap:5px;flex-wrap:wrap;padding:0 16px 10px}
.vbadge{font-size:.67rem;font-weight:700;padding:3px 9px;border-radius:6px}
.vbadge.red{background:#fef2f2;color:var(--red);border:1px solid #fecaca}
.vbadge.green{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0}
.vbadge.amber{background:#fffbeb;color:var(--warn);border:1px solid #fde68a}
.vbadge.blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.vcard-actions{display:flex;gap:6px;padding:0 16px 14px;flex-wrap:wrap}

/* ── EMPTY ── */
.empty{grid-column:1/-1;text-align:center;padding:72px 24px;color:var(--muted)}
.empty-icon{font-size:3.5rem;margin-bottom:14px;opacity:.3}
.empty p{font-size:.95rem}

/* ── MODAIS ── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(10,10,30,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border:1px solid var(--border);border-radius:18px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:16px;transform:translateY(16px);transition:transform .25s;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:1.1rem;font-weight:800;color:var(--text)}
.modal-close{background:var(--bg);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:1.1rem;line-height:1;padding:5px 9px;border-radius:7px;transition:all .18s}
.modal-close:hover{color:var(--text);background:var(--surf2)}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-full{grid-column:1/-1}
.fgroup{display:flex;flex-direction:column;gap:5px}
.fgroup label{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.fgroup input,.fgroup select,.fgroup textarea{
  background:var(--bg);border:1.5px solid var(--border);border-radius:9px;
  padding:9px 12px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.86rem;outline:none;transition:border-color .18s;width:100%;
}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{border-color:var(--red);background:var(--white)}
.fgroup input::placeholder,.fgroup textarea::placeholder{color:var(--muted)}
.fgroup textarea{resize:vertical;min-height:64px}
.fgroup select option{background:var(--white)}
.fsection{
  grid-column:1/-1;font-size:.68rem;font-weight:700;
  color:var(--red);text-transform:uppercase;letter-spacing:.12em;
  padding-bottom:5px;border-bottom:2px solid #fecaca;margin-top:6px;
}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
#f-photo-preview{display:none;margin-top:8px;width:100%;max-height:150px;object-fit:cover;border-radius:10px;border:1px solid var(--border)}

/* ── DETALHE LATERAL ── */
.detail-overlay{position:fixed;inset:0;z-index:150;background:rgba(10,10,30,.45);backdrop-filter:blur(3px);display:flex;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.detail-overlay.open{opacity:1;pointer-events:all}
.detail-panel{background:var(--white);border-left:1px solid var(--border);width:100%;max-width:440px;height:100%;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.1)}
.detail-overlay.open .detail-panel{transform:translateX(0)}
.detail-photo{width:100%;height:180px;border-radius:12px;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:3.5rem;border:1px solid var(--border)}
.detail-photo img{width:100%;height:100%;object-fit:cover;display:block}
.detail-name{font-size:1.3rem;font-weight:800;color:var(--text)}
.detail-plate{font-family:'JetBrains Mono',monospace;font-size:.82rem;padding:3px 11px;border:1.5px solid var(--border);border-radius:7px;color:var(--text2);background:var(--bg);display:inline-block;margin-top:5px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.info-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px}
.info-box.full{grid-column:1/-1}
.info-lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.info-val{font-size:.86rem;color:var(--text);font-weight:600;margin-top:3px}
.doc-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:5px}
.stbadge{font-size:.67rem;padding:2px 9px;border-radius:20px;font-weight:600}
.stbadge.ok{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0}
.stbadge.warn{background:#fffbeb;color:var(--warn);border:1px solid #fde68a}
.stbadge.danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.stbadge.neutral{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.maint-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.maint-lbl{font-size:.68rem;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.1em}
.maint-list{display:flex;flex-direction:column;gap:7px}
.maint-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;align-items:flex-start;gap:8px}
.maint-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:6px}
.maint-info{flex:1;min-width:0}
.maint-desc{font-size:.83rem;color:var(--text);font-weight:600;line-height:1.3}
.maint-meta{font-size:.7rem;color:var(--muted);margin-top:2px;line-height:1.5}
.maint-empty{font-size:.82rem;color:var(--muted);text-align:center;padding:18px 0;font-style:italic}
.maint-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:.8rem;padding:2px 5px;border-radius:5px;transition:all .18s;flex-shrink:0}
.maint-del:hover{color:var(--danger);background:#fef2f2}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--text);color:#fff;border-radius:10px;padding:11px 20px;font-size:.83rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:all .3s;z-index:500;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .topbar{padding:0 16px}
  .hero-strip{padding:20px 16px}
  .filters-bar{padding:12px 16px}
  .page-body{padding:16px 14px 48px}
  .form-grid{grid-template-columns:1fr}
  .form-full,.fsection{grid-column:1}
  .summary{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="logo" href="#">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="1" y="3" width="15" height="13" rx="2"/>
        <path d="M16 8h4l3 3v5h-7V8z"/>
        <circle cx="5.5" cy="18.5" r="2.5"/>
        <circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
    </div>
    <span class="logo-name">Minha<span>Garagem</span></span>
  </a>
  <div class="topbar-right">
    <button class="btn btn-outline btn-sm" onclick="exportData()">⬇ Exportar</button>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('import-file').click()">⬆ Importar</button>
    <input type="file" id="import-file" accept=".json" style="display:none"/>
    <button class="btn btn-red" onclick="openVehicleModal(null)">+ Adicionar viatura</button>
  </div>
</div>

<!-- ALERTS -->
<div id="alert-banner"><div class="alert-list" id="alert-list"></div></div>

<!-- HERO -->
<div class="hero-strip">
  <div class="hero-left">
    <h1>A Minha <span>Garagem</span></h1>
    <p>Gestão de viaturas, documentos e manutenções</p>
  </div>
  <div class="summary">
    <div class="sum-item"><div class="sum-num r" id="s-total">0</div><div class="sum-label">Viaturas</div></div>
    <div class="sum-item"><div class="sum-num g" id="s-ok">0</div><div class="sum-label">Em dia</div></div>
    <div class="sum-item"><div class="sum-num w" id="s-warn">0</div><div class="sum-label">A expirar</div></div>
    <div class="sum-item"><div class="sum-num d" id="s-danger">0</div><div class="sum-label">Expirados</div></div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters-bar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="f-search" placeholder="Pesquisar marca, modelo, matrícula…" oninput="renderGrid()"/>
  </div>
  <select class="filter-sel" id="f-fuel-filter" onchange="renderGrid()">
    <option value="">Combustível</option>
    <option>Gasolina</option><option>Gasóleo</option>
    <option>Híbrido</option><option>Híbrido Plug-In (Gasolina)</option>
    <option>Elétrico</option><option>GPL</option>
  </select>
  <select class="filter-sel" id="f-status-filter" onchange="renderGrid()">
    <option value="">Estado documentos</option>
    <option value="ok">Em dia</option>
    <option value="warn">A expirar (30d)</option>
    <option value="danger">Expirados</option>
  </select>
  <select class="filter-sel" id="f-sort" onchange="renderGrid()">
    <option value="name">Nome A–Z</option>
    <option value="year-desc">Ano (mais recente)</option>
    <option value="km-asc">Menos km</option>
    <option value="price-asc">Preço ↑</option>
    <option value="price-desc">Preço ↓</option>
  </select>
  <span class="results-tag" id="results-count"></span>
</div>

<!-- GRID -->
<div class="page-body">
  <div class="vehicles-grid" id="vehicles-grid">
    <div class="empty"><div class="empty-icon">🚗</div><p>Ainda não há viaturas.<br>Clica em <b>+ Adicionar viatura</b> para começar.</p></div>
  </div>
</div>

<!-- MODAL VIATURA -->
<div class="modal-overlay" id="vehicle-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nova Viatura</span>
      <button class="modal-close" onclick="closeModal('vehicle-modal')">✕</button>
    </div>
    <div class="form-grid">
      <div class="fsection">Identificação</div>
      <div class="fgroup form-full"><label>Marca e Modelo *</label><input id="f-name" placeholder="ex: Peugeot 208 1.2 Allure"/></div>
      <div class="fgroup form-full"><label>Versão / Variante</label><input id="f-variant" placeholder="ex: 208 1.2 Hybrid Allure E-Dcs6"/></div>
      <div class="fgroup"><label>Matrícula</label><input id="f-plate" placeholder="AA-00-BB"/></div>
      <div class="fgroup"><label>Ano</label><input id="f-year" type="number" min="1900" max="2100" placeholder="2024"/></div>
      <div class="fgroup"><label>Combustível</label>
        <select id="f-fuel">
          <option value="">– Selecionar –</option>
          <option>Gasolina</option><option>Gasóleo</option>
          <option>Híbrido</option><option>Híbrido Plug-In (Gasolina)</option>
          <option>Elétrico</option><option>GPL</option>
        </select>
      </div>
      <div class="fgroup"><label>Caixa</label>
        <select id="f-gearbox">
          <option value="">– Selecionar –</option>
          <option>Caixa Manual</option><option>Caixa Automática</option>
        </select>
      </div>
      <div class="fgroup"><label>Cor</label><input id="f-color" placeholder="ex: Branco"/></div>
      <div class="fgroup"><label>Quilómetros</label><input id="f-km" type="number" placeholder="ex: 33707"/></div>
      <div class="fgroup"><label>Valor (€)</label><input id="f-price" type="number" placeholder="ex: 21999"/></div>
      <div class="fgroup"><label>Valor anterior (€)</label><input id="f-price-old" type="number" placeholder="ex: 23499"/></div>

      <div class="fsection">Foto</div>
      <div class="fgroup form-full"><label>URL de imagem</label><input id="f-photo-url" placeholder="https://..." oninput="onPhotoUrlChange()"/></div>
      <div class="fgroup form-full">
        <label>Ou carrega do dispositivo</label>
        <button type="button" class="btn btn-outline btn-sm" style="width:fit-content" onclick="document.getElementById('f-photo-file').click()">📷 Escolher ficheiro</button>
        <input type="file" id="f-photo-file" accept="image/*" style="display:none"/>
        <img id="f-photo-preview"/>
      </div>

      <div class="fsection">Documentos</div>
      <div class="fgroup"><label>Seguro — validade</label><input id="f-seguro" type="date"/></div>
      <div class="fgroup"><label>Inspeção — validade</label><input id="f-inspecao" type="date"/></div>
      <div class="fgroup"><label>IUC — validade</label><input id="f-iuc" type="date"/></div>
      <div class="fgroup form-full"><label>Notas</label><textarea id="f-notes" placeholder="Informações adicionais…"></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('vehicle-modal')">Cancelar</button>
      <button class="btn btn-red" onclick="saveVehicle()">Guardar viatura</button>
    </div>
  </div>
</div>

<!-- MODAL MANUTENÇÃO -->
<div class="modal-overlay" id="maint-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title">Registar manutenção</span>
      <button class="modal-close" onclick="closeModal('maint-modal')">✕</button>
    </div>
    <div class="form-grid">
      <div class="fgroup form-full"><label>Descrição *</label><input id="m-desc" placeholder="ex: Mudança de óleo e filtro"/></div>
      <div class="fgroup"><label>Data</label><input id="m-date" type="date"/></div>
      <div class="fgroup"><label>Km</label><input id="m-km" type="number" placeholder="km no momento"/></div>
      <div class="fgroup"><label>Custo (€)</label><input id="m-cost" type="number" step="0.01" placeholder="0.00"/></div>
      <div class="fgroup"><label>Próx. manutenção (km)</label><input id="m-next" type="number" placeholder="opcional"/></div>
      <div class="fgroup form-full"><label>Notas</label><textarea id="m-notes" placeholder="Oficina, peças, garantia…"></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('maint-modal')">Cancelar</button>
      <button class="btn btn-red" onclick="saveMaintenance()">Guardar</button>
    </div>
  </div>
</div>

<!-- PAINEL DETALHE -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE='garagem_v5';
let db={vehicles:[]};
let editingId=null,activeVehicleId=null,pendingPhotoData=null;

function dbLoad(){try{const r=localStorage.getItem(STORE);if(r)db=JSON.parse(r);}catch(e){}}
function dbSave(){localStorage.setItem(STORE,JSON.stringify(db));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function daysUntil(ds){if(!ds)return null;return Math.ceil((new Date(ds)-new Date())/86400000);}
function fmtDate(ds){if(!ds)return '–';return new Date(ds).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'});}
function fmtKm(k){if(!k)return'–';return Number(k).toLocaleString('pt-PT')+' kms';}
function fmtPrice(p){if(!p)return null;return Number(p).toLocaleString('pt-PT')+'€';}
function docStatus(ds){
  const d=daysUntil(ds);
  if(d===null)return{cls:'neutral',txt:'Não definido'};
  if(d<0)return{cls:'danger',txt:`Expirado há ${Math.abs(d)}d`};
  if(d<=30)return{cls:'warn',txt:`Expira em ${d}d`};
  return{cls:'ok',txt:`Válido — ${d}d`};
}
function worstStatus(v){
  let w='ok';
  ['seguro','inspecao','iuc'].forEach(k=>{
    const s=docStatus(v[k]).cls;
    if(s==='danger')w='danger';
    else if(s==='warn'&&w!=='danger')w='warn';
  });
  return w;
}

function render(){renderSummary();renderAlerts();renderGrid();}

function renderSummary(){
  let ok=0,warn=0,danger=0;
  db.vehicles.forEach(v=>{const w=worstStatus(v);if(w==='danger')danger++;else if(w==='warn')warn++;else ok++;});
  document.getElementById('s-total').textContent=db.vehicles.length;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-warn').textContent=warn;
  document.getElementById('s-danger').textContent=danger;
}

function renderAlerts(){
  const banner=document.getElementById('alert-banner');
  const list=document.getElementById('alert-list');
  const alerts=[];
  db.vehicles.forEach(v=>{
    [['seguro','🛡 Seguro'],['inspecao','🔧 Inspeção'],['iuc','📄 IUC']].forEach(([k,label])=>{
      const st=docStatus(v[k]);
      if(st.cls==='danger')alerts.push({cls:'danger',msg:`<b>${v.name}</b> — ${label}: <b>${st.txt}</b>`});
      else if(st.cls==='warn')alerts.push({cls:'warn',msg:`<b>${v.name}</b> — ${label}: <b>${st.txt}</b>`});
    });
  });
  if(!alerts.length){banner.style.display='none';return;}
  banner.style.display='block';
  list.innerHTML=alerts.map(a=>`<div class="alert-item ${a.cls}"><span>${a.cls==='danger'?'🔴':'🟡'}</span><span>${a.msg}</span></div>`).join('');
}

function renderGrid(){
  const grid=document.getElementById('vehicles-grid');
  const q=(document.getElementById('f-search').value||'').toLowerCase();
  const fuelF=document.getElementById('f-fuel-filter').value;
  const stF=document.getElementById('f-status-filter').value;
  const sort=document.getElementById('f-sort').value;

  let list=db.vehicles.filter(v=>{
    if(q&&!v.name.toLowerCase().includes(q)&&!(v.variant||'').toLowerCase().includes(q)&&!(v.plate||'').toLowerCase().includes(q))return false;
    if(fuelF&&v.fuel!==fuelF)return false;
    if(stF&&worstStatus(v)!==stF)return false;
    return true;
  });

  list.sort((a,b)=>{
    if(sort==='name')return a.name.localeCompare(b.name);
    if(sort==='year-desc')return(Number(b.year)||0)-(Number(a.year)||0);
    if(sort==='km-asc')return(Number(a.km)||999999)-(Number(b.km)||999999);
    if(sort==='price-asc')return(Number(a.price)||999999)-(Number(b.price)||999999);
    if(sort==='price-desc')return(Number(b.price)||0)-(Number(a.price)||0);
    return 0;
  });

  document.getElementById('results-count').textContent=list.length?`${list.length} viatura${list.length!==1?'s':''}`:'';

  if(!list.length){
    grid.innerHTML=db.vehicles.length
      ?`<div class="empty"><div class="empty-icon">🔍</div><p>Nenhuma viatura encontrada com esses filtros.</p></div>`
      :`<div class="empty"><div class="empty-icon">🚗</div><p>Ainda não há viaturas.<br>Clica em <b>+ Adicionar viatura</b> para começar.</p></div>`;
    return;
  }

  grid.innerHTML=list.map(v=>{
    const ws=worstStatus(v);
    const seg=docStatus(v.seguro);
    const ins=docStatus(v.inspecao);
    const priceNew=fmtPrice(v.price);
    const priceOld=fmtPrice(v['price-old']);

    const tags=[
      v.fuel?`<span class="vtag fuel">${v.fuel}</span>`:'',
      v.gearbox?`<span class="vtag">${v.gearbox}</span>`:'',
      v.year?`<span class="vtag">${v.year}</span>`:'',
      v.km?`<span class="vtag">${fmtKm(v.km)}</span>`:'',
    ].filter(Boolean).join('');

    const bottomBadges=[
      ws==='danger'?`<span class="vbadge red">Doc. Expirado</span>`:'',
      ws==='warn'?`<span class="vbadge amber">⚠ A expirar</span>`:'',
      v.km&&Number(v.km)<10000?`<span class="vbadge green">Poucos km</span>`:'',
      ws==='ok'&&v.seguro?`<span class="vbadge blue">Em Destaque</span>`:'',
    ].filter(Boolean).join('');

    const ribbon=[
      v.seguro?`<span class="doc-pip ${seg.cls}">🛡 ${seg.txt}</span>`:'',
      v.inspecao?`<span class="doc-pip ${ins.cls}">🔧 ${ins.txt}</span>`:'',
    ].filter(Boolean).join('');

    return `<div class="vcard ${ws==='danger'?'has-danger':ws==='warn'?'has-warn':''}">
      <div class="vcard-img">
        ${v.photo
          ?`<img src="${v.photo}" alt="${v.name}" onerror="this.outerHTML='<div class=vcard-img-placeholder>🚗</div>'"/>`
          :`<div class="vcard-img-placeholder">🚗</div>`}
        <span class="badge-campaign">Em Garagem</span>
        <button class="btn-wish ${v.wished?'active':''}" onclick="toggleWish('${v.id}')">${v.wished?'♥':'♡'}</button>
        ${ribbon?`<div class="doc-ribbon">${ribbon}</div>`:''}
      </div>
      <div class="vcard-body">
        <div class="vcard-title">${v.name}</div>
        ${v.variant?`<div class="vcard-sub">${v.variant}</div>`:''}
        <div class="vtags">${tags||''}</div>
        <hr class="vdiv"/>
        <div style="height:4px"></div>
        <div class="vcard-spacer"></div>
      </div>
      ${bottomBadges?`<div class="vcard-bottom">${bottomBadges}</div>`:``}
      <div class="vcard-actions">
        <button class="btn btn-outline btn-sm" onclick="openDetail('${v.id}')">Ver detalhes</button>
        <button class="btn btn-outline btn-sm" onclick="openVehicleModal('${v.id}')">✏ Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteVehicle('${v.id}')">Apagar</button>
      </div>
    </div>`;
  }).join('');
}

function toggleWish(id){const v=db.vehicles.find(x=>x.id===id);if(!v)return;v.wished=!v.wished;dbSave();renderGrid();}

function openVehicleModal(id){
  editingId=id;pendingPhotoData=null;
  ['f-name','f-variant','f-plate','f-year','f-color','f-km','f-price','f-price-old','f-seguro','f-inspecao','f-iuc','f-notes','f-photo-url'].forEach(fid=>{const el=document.getElementById(fid);if(el)el.value='';});
  document.getElementById('f-fuel').value='';
  document.getElementById('f-gearbox').value='';
  document.getElementById('f-photo-file').value='';
  const prev=document.getElementById('f-photo-preview');prev.style.display='none';prev.src='';
  document.getElementById('modal-title').textContent=id?'Editar Viatura':'Nova Viatura';
  if(id){
    const v=db.vehicles.find(x=>x.id===id);
    if(v){
      const map={name:'f-name',variant:'f-variant',plate:'f-plate',year:'f-year',color:'f-color',km:'f-km',price:'f-price','price-old':'f-price-old',seguro:'f-seguro',inspecao:'f-inspecao',iuc:'f-iuc',notes:'f-notes'};
      Object.entries(map).forEach(([field,fid])=>{const el=document.getElementById(fid);if(el&&v[field]!=null)el.value=v[field];});
      if(v.fuel)document.getElementById('f-fuel').value=v.fuel;
      if(v.gearbox)document.getElementById('f-gearbox').value=v.gearbox;
      if(v.photo){
        if(v.photo.startsWith('data:')){pendingPhotoData=v.photo;prev.src=v.photo;prev.style.display='block';}
        else{document.getElementById('f-photo-url').value=v.photo;prev.src=v.photo;prev.style.display='block';}
      }
    }
  }
  document.getElementById('vehicle-modal').classList.add('open');
}

function onPhotoUrlChange(){
  const url=document.getElementById('f-photo-url').value.trim();
  const prev=document.getElementById('f-photo-preview');
  pendingPhotoData=null;
  if(url){prev.src=url;prev.style.display='block';}else{prev.style.display='none';prev.src='';}
}

document.getElementById('f-photo-file').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingPhotoData=ev.target.result;
    document.getElementById('f-photo-url').value='';
    const prev=document.getElementById('f-photo-preview');
    prev.src=pendingPhotoData;prev.style.display='block';
  };
  reader.readAsDataURL(file);
});

function saveVehicle(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('⚠ Indica a marca e modelo');return;}
  const photo=pendingPhotoData||document.getElementById('f-photo-url').value.trim();
  const v={
    id:editingId||uid(),name,
    variant:document.getElementById('f-variant').value.trim(),
    plate:document.getElementById('f-plate').value.trim().toUpperCase(),
    year:document.getElementById('f-year').value.trim(),
    fuel:document.getElementById('f-fuel').value,
    gearbox:document.getElementById('f-gearbox').value,
    color:document.getElementById('f-color').value.trim(),
    km:document.getElementById('f-km').value.trim(),
    price:document.getElementById('f-price').value.trim(),
    'price-old':document.getElementById('f-price-old').value.trim(),
    photo,
    seguro:document.getElementById('f-seguro').value,
    inspecao:document.getElementById('f-inspecao').value,
    iuc:document.getElementById('f-iuc').value,
    notes:document.getElementById('f-notes').value.trim(),
    maintenance:[],wished:false
  };
  if(editingId){
    const idx=db.vehicles.findIndex(x=>x.id===editingId);
    if(idx>-1){v.maintenance=db.vehicles[idx].maintenance||[];v.wished=db.vehicles[idx].wished||false;db.vehicles[idx]=v;}
  }else{db.vehicles.push(v);}
  dbSave();render();closeModal('vehicle-modal');
  showToast(editingId?'✓ Viatura atualizada':'✓ Viatura adicionada');
}

function deleteVehicle(id){
  if(!confirm('Apagar esta viatura e todo o historial?'))return;
  db.vehicles=db.vehicles.filter(v=>v.id!==id);
  dbSave();render();showToast('Viatura removida');
}

function openDetail(id){
  const v=db.vehicles.find(x=>x.id===id);if(!v)return;
  activeVehicleId=id;
  const seg=docStatus(v.seguro),ins=docStatus(v.inspecao),iuc=docStatus(v.iuc);
  const maints=(v.maintenance||[]).slice().reverse();
  const mHTML=maints.length
    ?maints.map((m,i)=>`<div class="maint-item">
        <div class="maint-dot"></div>
        <div class="maint-info">
          <div class="maint-desc">${m.desc}</div>
          <div class="maint-meta">${fmtDate(m.date)}${m.km?' · '+Number(m.km).toLocaleString('pt-PT')+' km':''}${m.cost?' · '+Number(m.cost).toFixed(2)+'€':''}${m.next?'<br>Próx: '+Number(m.next).toLocaleString('pt-PT')+' km':''}${m.notes?'<br>'+m.notes:''}</div>
        </div>
        <button class="maint-del" onclick="deleteMaint('${id}',${maints.length-1-i})">✕</button>
      </div>`).join('')
    :`<div class="maint-empty">Sem registos de manutenção.</div>`;

  document.getElementById('detail-panel').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Detalhe</span>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-photo">${v.photo?`<img src="${v.photo}" alt="${v.name}" onerror="this.outerHTML='🚗'"/>`:'🚗'}</div>
    <div>
      <div class="detail-name">${v.name}</div>
      ${v.variant?`<div style="font-size:.8rem;color:var(--muted);margin-top:3px">${v.variant}</div>`:''}
      ${v.plate?`<div class="detail-plate">${v.plate}</div>`:''}
    </div>
    <div class="info-grid">
      <div class="info-box"><div class="info-lbl">Ano</div><div class="info-val">${v.year||'–'}</div></div>
      <div class="info-box"><div class="info-lbl">Combustível</div><div class="info-val">${v.fuel||'–'}</div></div>
      <div class="info-box"><div class="info-lbl">Caixa</div><div class="info-val">${v.gearbox||'–'}</div></div>
      <div class="info-box"><div class="info-lbl">Cor</div><div class="info-val">${v.color||'–'}</div></div>
      <div class="info-box"><div class="info-lbl">Quilómetros</div><div class="info-val">${fmtKm(v.km)}</div></div>
      ${v.price?`<div class="info-box"><div class="info-lbl">Valor</div><div class="info-val" style="color:var(--red);font-size:1.1rem">${fmtPrice(v.price)}</div></div>`:''}
      <div class="info-box full"><div class="info-lbl">🛡 Seguro</div><div class="doc-row"><span class="info-val">${fmtDate(v.seguro)}</span><span class="stbadge ${seg.cls}">${seg.txt}</span></div></div>
      <div class="info-box full"><div class="info-lbl">🔧 Inspeção</div><div class="doc-row"><span class="info-val">${fmtDate(v.inspecao)}</span><span class="stbadge ${ins.cls}">${ins.txt}</span></div></div>
      ${v.iuc?`<div class="info-box full"><div class="info-lbl">📄 IUC</div><div class="doc-row"><span class="info-val">${fmtDate(v.iuc)}</span><span class="stbadge ${iuc.cls}">${iuc.txt}</span></div></div>`:''}
      ${v.notes?`<div class="info-box full"><div class="info-lbl">Notas</div><div class="info-val" style="color:var(--text2);font-size:.82rem;font-weight:400;margin-top:4px">${v.notes}</div></div>`:''}
    </div>
    <div>
      <div class="maint-header">
        <span class="maint-lbl">📋 Historial de Manutenção</span>
        <button class="btn btn-ghost-red btn-sm" onclick="openMaintModal()">+ Registar</button>
      </div>
      <div class="maint-list">${mHTML}</div>
    </div>`;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');}
document.getElementById('detail-overlay').addEventListener('click',function(e){if(e.target===this)closeDetail();});

function openMaintModal(){
  document.getElementById('m-desc').value='';
  document.getElementById('m-date').value=new Date().toISOString().slice(0,10);
  ['m-km','m-cost','m-next','m-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('maint-modal').classList.add('open');
}
function saveMaintenance(){
  const desc=document.getElementById('m-desc').value.trim();
  if(!desc){showToast('⚠ Descreve a manutenção');return;}
  const v=db.vehicles.find(x=>x.id===activeVehicleId);if(!v)return;
  if(!v.maintenance)v.maintenance=[];
  v.maintenance.push({desc,date:document.getElementById('m-date').value,km:document.getElementById('m-km').value.trim(),cost:document.getElementById('m-cost').value.trim(),next:document.getElementById('m-next').value.trim(),notes:document.getElementById('m-notes').value.trim()});
  dbSave();render();closeModal('maint-modal');openDetail(activeVehicleId);
  showToast('✓ Manutenção registada');
}
function deleteMaint(vehicleId,realIdx){
  if(!confirm('Apagar este registo?'))return;
  const v=db.vehicles.find(x=>x.id===vehicleId);if(!v||!v.maintenance)return;
  v.maintenance.splice(realIdx,1);dbSave();render();openDetail(vehicleId);
  showToast('Registo removido');
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
['vehicle-modal','maint-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});

function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='garagem_dados.json';a.click();
  showToast('✓ Dados exportados');
}
document.getElementById('import-file').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      if(!Array.isArray(imp.vehicles))throw new Error();
      if(!confirm(`Importar ${imp.vehicles.length} viatura(s)? Os dados atuais serão substituídos.`))return;
      db=imp;dbSave();render();showToast(`✓ ${db.vehicles.length} viaturas importadas`);
    }catch{showToast('⚠ Ficheiro inválido');}
  };
  reader.readAsText(file);this.value='';
});

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

dbLoad();render();
</script>
</body>
</html>
